services:
  orchestrator:
    build: ./src/Orchestrator
    ports:
      - "5000:8080"
    env_file: .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=orchestrator
      - OTEL_RESOURCE_ATTRIBUTES=service.owner=khizar,service.module=1
    depends_on:
      researchsummarizer:
        condition: service_healthy
      reporter:
        condition: service_healthy
      notifier:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - intelliflow-network
    restart: unless-stopped

  researchsummarizer:
    build: ./src/ResearchSummarizer
    ports:
      - "5001:8080"
    env_file: .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=researchsummarizer
      - OTEL_RESOURCE_ATTRIBUTES=service.owner=hamza,service.module=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - intelliflow-network
    restart: unless-stopped

  reporter:
    build: ./src/Reporter
    ports:
      - "5002:8080"
    env_file: .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=reporter
      - OTEL_RESOURCE_ATTRIBUTES=service.owner=hassan,service.module=3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - intelliflow-network
    restart: unless-stopped

  notifier:
    build: ./src/Notifier
    ports:
      - "5003:8080"
    env_file: .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=notifier
      - OTEL_RESOURCE_ATTRIBUTES=service.owner=shamraiz,service.module=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - intelliflow-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "6831:6831"     # Jaeger Agent (UDP)
      - "14268:14268"   # Jaeger Collector (HTTP)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - jaeger-data:/badger
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:16686/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - intelliflow-network
    restart: unless-stopped

volumes:
  jaeger-data:
    driver: local

networks:
  intelliflow-network:
    driver: bridge
