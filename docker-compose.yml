version: "3.9"

services:
  orchestrator:
    build: ./src/Orchestrator
    ports:
      - "5000:8080"
    env_file: .env
    depends_on:
      researchsummarizer:
        condition: service_healthy
      reporter:
        condition: service_healthy
      notifier:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - intelliflow-network
    restart: unless-stopped

  researchsummarizer:
    build: ./src/ResearchSummarizer
    ports:
      - "5001:8080"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - intelliflow-network
    restart: unless-stopped

  reporter:
    build: ./src/Reporter
    ports:
      - "5002:8080"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - intelliflow-network
    restart: unless-stopped

  notifier:
    build: ./src/Notifier
    ports:
      - "5003:8080"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - intelliflow-network
    restart: unless-stopped

networks:
  intelliflow-network:
    driver: bridge
