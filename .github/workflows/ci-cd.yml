name: IntelliFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/intelliflow

jobs:
  # ── Build & Test ─────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [Orchestrator, ResearchSummarizer, Reporter, Notifier]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies — ${{ matrix.service }}
        run: dotnet restore src/${{ matrix.service }}/${{ matrix.service }}.API/${{ matrix.service }}.API.csproj

      - name: Build — ${{ matrix.service }}
        run: dotnet build src/${{ matrix.service }}/${{ matrix.service }}.API/${{ matrix.service }}.API.csproj --no-restore

      - name: Test — ${{ matrix.service }}
        run: dotnet test src/${{ matrix.service }}/${{ matrix.service }}.API/${{ matrix.service }}.API.csproj --no-build --verbosity normal
        continue-on-error: true

  # ── Docker Build & Push (main branch only) ───────────────────────
  docker-publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [Orchestrator, ResearchSummarizer, Reporter, Notifier]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service | lower }}:latest

  # ── Deploy to Render ──────────────────────────────────────────────
  deploy-render:
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Orchestrator to Render
        run: |
          curl -X POST "${{ secrets.RENDER_ORCHESTRATOR_DEPLOY_HOOK }}"

      - name: Deploy ResearchSummarizer to Render
        run: |
          curl -X POST "${{ secrets.RENDER_RESEARCH_DEPLOY_HOOK }}"

      - name: Deploy Reporter to Render
        run: |
          curl -X POST "${{ secrets.RENDER_REPORTER_DEPLOY_HOOK }}"

      - name: Deploy Notifier to Render
        run: |
          curl -X POST "${{ secrets.RENDER_NOTIFIER_DEPLOY_HOOK }}"