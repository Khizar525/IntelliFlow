name: IntelliFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/intelliflow

jobs:
  # ── Build & Test ─────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [Orchestrator, ResearchSummarizer, Reporter, Notifier]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies — ${{ matrix.service }}
        run: dotnet restore src/${{ matrix.service }}/${{ matrix.service }}.API/${{ matrix.service }}.API.csproj

      - name: Build — ${{ matrix.service }}
        run: dotnet build src/${{ matrix.service }}/${{ matrix.service }}.API/${{ matrix.service }}.API.csproj --no-restore

      - name: Test — ${{ matrix.service }}
        run: dotnet test src/${{ matrix.service }}/${{ matrix.service }}.API/${{ matrix.service }}.API.csproj --no-build --verbosity normal
        continue-on-error: true

  # ── Docker Build & Push (main branch only) ───────────────────────
  docker-publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [Orchestrator, ResearchSummarizer, Reporter, Notifier]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service | lower }}:latest

  # ── Deploy to Azure Container Instances ──────────────────────────
  deploy-azure:
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Orchestrator to ACI
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          dns-name-label: intelliflow-orchestrator
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-orchestrator:latest
          name: intelliflow-orchestrator
          location: eastus
          environment-variables: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RESEARCH_SERVICE_URL=${{ secrets.RESEARCH_SERVICE_URL }}
            REPORTER_SERVICE_URL=${{ secrets.REPORTER_SERVICE_URL }}
            NOTIFIER_SERVICE_URL=${{ secrets.NOTIFIER_SERVICE_URL }}

      - name: Deploy ResearchSummarizer to ACI
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          dns-name-label: intelliflow-researchsummarizer
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-researchsummarizer:latest
          name: intelliflow-researchsummarizer
          location: eastus
          environment-variables: |
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

      - name: Deploy Reporter to ACI
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          dns-name-label: intelliflow-reporter
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-reporter:latest
          name: intelliflow-reporter
          location: eastus

      - name: Deploy Notifier to ACI
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          dns-name-label: intelliflow-notifier
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-notifier:latest
          name: intelliflow-notifier
          location: eastus
          environment-variables: |
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            ALCHEMY_RPC_URL=${{ secrets.ALCHEMY_RPC_URL }}
            ETH_PRIVATE_KEY=${{ secrets.ETH_PRIVATE_KEY }}
            AUDIT_CONTRACT_ADDRESS=${{ secrets.AUDIT_CONTRACT_ADDRESS }}