name: IntelliFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/intelliflow

jobs:
  # ── Build & Test ─────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [Orchestrator, ResearchSummarizer, Reporter, Notifier]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies — ${{ matrix.service }}
        run: dotnet restore src/${{ matrix.service }}/${{ matrix.service }}.API/${{ matrix.service }}.API.csproj

      - name: Build — ${{ matrix.service }}
        run: dotnet build src/${{ matrix.service }}/${{ matrix.service }}.API/${{ matrix.service }}.API.csproj --no-restore

      - name: Test — ${{ matrix.service }}
        run: dotnet test src/${{ matrix.service }}/${{ matrix.service }}.API/${{ matrix.service }}.API.csproj --no-build --verbosity normal
        continue-on-error: true

  # ── Frontend Build ──────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Docker Build & Push (main branch only) ───────────────────────
  docker-publish:
    needs: [build-and-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [Orchestrator, ResearchSummarizer, Reporter, Notifier]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service | lower }}:latest

  # ── Security Scan ──────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ── Code Quality ──────────────────────────────────────────────
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Check formatting
        run: |
          dotnet format --verify-no-changes --verbosity diagnostic || true
        continue-on-error: true

      - name: Run security analysis
        run: |
          echo "Running security analysis..."
          # Check for common security issues in code
          grep -r "password" --include="*.cs" . | grep -v "HashedPassword" | grep -v "//" || true
          echo "Security analysis completed"
